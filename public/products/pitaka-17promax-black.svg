<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800">
  <defs>
    <pattern id="carbon" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="10" height="10" fill="#1a1a1a"/>
      <rect x="10" y="0" width="10" height="10" fill="#222222"/>
      <rect x="0" y="10" width="10" height="10" fill="#222222"/>
      <rect x="10" y="10" width="10" height="10" fill="#1a1a1a"/>
      <line x1="0" y1="0" x2="10" y2="10" stroke="#2a2a2a" stroke-width="0.5"/>
      <line x1="10" y1="0" x2="0" y2="10" stroke="#2a2a2a" stroke-width="0.5" transform="translate(10,0)"/>
    </pattern>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a;stop-opacity:0.3"/>
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.05"/>
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Фон -->
  <rect width="800" height="800" fill="#f5f5f5"/>
  
  <!-- Тень чехла -->
  <rect x="230" y="100" width="340" height="600" rx="50" ry="50" fill="#000" opacity="0.15" transform="translate(8,12)"/>
  
  <!-- Основа чехла -->
  <rect x="230" y="100" width="340" height="600" rx="50" ry="50" fill="url(#carbon)" filter="url(#shadow)"/>
  <rect x="230" y="100" width="340" height="600" rx="50" ry="50" fill="url(#shine)"/>
  
  <!-- Вырез камеры -->
  <rect x="270" y="130" width="120" height="120" rx="30" ry="30" fill="#111111"/>
  <circle cx="310" cy="175" r="22" fill="#0a0a0a" stroke="#333" stroke-width="2"/>
  <circle cx="310" cy="175" r="14" fill="#050505"/>
  <circle cx="310" cy="175" r="6" fill="#1a1a1a"/>
  <circle cx="355" cy="175" r="22" fill="#0a0a0a" stroke="#333" stroke-width="2"/>
  <circle cx="355" cy="175" r="14" fill="#050505"/>
  <circle cx="355" cy="175" r="6" fill="#1a1a1a"/>
  <circle cx="332" cy="218" r="14" fill="#0a0a0a" stroke="#333" stroke-width="2"/>
  <circle cx="332" cy="218" r="8" fill="#050505"/>
  
  <!-- Кнопки сбоку -->
  <rect x="222" y="260" width="8" height="50" rx="4" fill="#111"/>
  <rect x="222" y="330" width="8" height="80" rx="4" fill="#111"/>
  <rect x="570" y="280" width="8" height="70" rx="4" fill="#111"/>
  
  <!-- Логотип PITAKA -->
  <text x="400" y="480" font-family="Arial, sans-serif" font-size="28" font-weight="bold" 
        fill="#ffffff" text-anchor="middle" opacity="0.9" letter-spacing="6">PITAKA</text>
  
  <!-- Линия под логотипом -->
  <line x1="330" y1="495" x2="470" y2="495" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  
  <!-- Модель -->
  <text x="400" y="530" font-family="Arial, sans-serif" font-size="16" 
        fill="#aaaaaa" text-anchor="middle" letter-spacing="2">MagEZ Case</text>
  <text x="400" y="555" font-family="Arial, sans-serif" font-size="14" 
        fill="#888888" text-anchor="middle">iPhone 17 Pro Max</text>
  
  <!-- MagSafe кольцо снизу -->
  <circle cx="400" cy="640" r="35" fill="none" stroke="#444" stroke-width="2" opacity="0.6"/>
  <circle cx="400" cy="640" r="28" fill="none" stroke="#333" stroke-width="1" opacity="0.4"/>
</svg>